<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regime Detection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { background-color: #0f172a; } </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-6">
  <div class="max-w-5xl mx-auto space-y-6">
    <header class="border-b border-slate-600 pb-4 flex items-center justify-between flex-wrap gap-2">
      <div>
        <h1 class="text-xl font-bold text-slate-100">Regime Detection</h1>
        <p class="text-slate-400 text-sm mt-0.5">TREND_UP · TREND_DOWN · RANGE · VOLATILE</p>
      </div>
      <nav class="flex gap-3 text-sm">
        <a href="/meme" class="text-slate-400 hover:text-slate-200">MPI</a>
        <a href="/meme/diagnostics" class="text-slate-400 hover:text-slate-200">진단</a>
        <span class="text-amber-400 font-medium">Regime</span>
        <a href="/" class="text-slate-400 hover:text-slate-200">메인</a>
      </nav>
    </header>

    <section>
      <h2 class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-3">현재 Regime (BTC · ETH · SOL · XRP)</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div id="regime-BTC" class="bg-slate-800 rounded-lg p-4 border border-slate-700">
          <div class="text-slate-400 text-xs">BTC</div>
          <div id="regime-val-BTC" class="text-lg font-bold text-amber-400 mt-1">—</div>
          <div id="regime-meta-BTC" class="text-xs text-slate-500 mt-1">—</div>
        </div>
        <div id="regime-ETH" class="bg-slate-800 rounded-lg p-4 border border-slate-700">
          <div class="text-slate-400 text-xs">ETH</div>
          <div id="regime-val-ETH" class="text-lg font-bold text-amber-400 mt-1">—</div>
          <div id="regime-meta-ETH" class="text-xs text-slate-500 mt-1">—</div>
        </div>
        <div id="regime-SOL" class="bg-slate-800 rounded-lg p-4 border border-slate-700">
          <div class="text-slate-400 text-xs">SOL</div>
          <div id="regime-val-SOL" class="text-lg font-bold text-amber-400 mt-1">—</div>
          <div id="regime-meta-SOL" class="text-xs text-slate-500 mt-1">—</div>
        </div>
        <div id="regime-XRP" class="bg-slate-800 rounded-lg p-4 border border-slate-700">
          <div class="text-slate-400 text-xs">XRP</div>
          <div id="regime-val-XRP" class="text-lg font-bold text-amber-400 mt-1">—</div>
          <div id="regime-meta-XRP" class="text-xs text-slate-500 mt-1">—</div>
        </div>
      </div>
    </section>

    <section>
      <h2 class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-3">Regime History Chart</h2>
      <div class="flex gap-2 mb-2">
        <label class="text-slate-400 text-sm">Symbol</label>
        <select id="history-symbol" class="bg-slate-800 border border-slate-600 rounded px-2 py-1 text-slate-200 text-sm">
          <option value="BTC">BTC</option>
          <option value="ETH">ETH</option>
          <option value="SOL">SOL</option>
          <option value="XRP">XRP</option>
        </select>
      </div>
      <div class="bg-slate-800 rounded-lg p-4 border border-slate-700 min-h-[200px]">
        <div id="regime-chart" class="text-sm text-slate-300 space-y-1 font-mono"></div>
      </div>
    </section>
  </div>

  <script>
    const REGIME_COLOR = { TREND_UP: 'text-emerald-400', TREND_DOWN: 'text-red-400', RANGE: 'text-slate-400', VOLATILE: 'text-amber-400' };
    function fetchCurrent() {
      fetch('/api/regime/current')
        .then(r => r.json())
        .then(data => {
          const bySymbol = data.bySymbol || {};
          ['BTC', 'ETH', 'SOL', 'XRP'].forEach(sym => {
            const r = bySymbol[sym];
            const elVal = document.getElementById('regime-val-' + sym);
            const elMeta = document.getElementById('regime-meta-' + sym);
            if (elVal) {
              elVal.textContent = r && r.regime ? r.regime : '—';
              elVal.className = 'text-lg font-bold mt-1 ' + (r && REGIME_COLOR[r.regime] ? REGIME_COLOR[r.regime] : 'text-amber-400');
            }
            if (elMeta && r) {
              elMeta.textContent = (r.volatility != null ? 'vol ' + Number(r.volatility).toFixed(2) : '') + (r.trend_strength != null ? ' · trend ' + Number(r.trend_strength).toFixed(2) : '');
            }
          });
        })
        .catch(() => {});
    }
    function fetchHistory() {
      const symbol = document.getElementById('history-symbol').value || 'BTC';
      fetch('/api/regime/history?symbol=' + encodeURIComponent(symbol) + '&limit=50')
        .then(r => r.json())
        .then(data => {
          const history = (data.history || []).slice(-30);
          const el = document.getElementById('regime-chart');
          if (history.length === 0) {
            el.innerHTML = '<div class="text-slate-500">데이터 수집 중…</div>';
            return;
          }
          el.innerHTML = history.map(h => {
            const time = h.timestamp ? new Date(h.timestamp * 1000).toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '—';
            const color = REGIME_COLOR[h.regime] || 'text-slate-400';
            return '<div class="flex gap-4"><span class="text-slate-500 w-24">' + time + '</span><span class="' + color + '">' + (h.regime || '—') + '</span></div>';
          }).join('');
        })
        .catch(() => {});
    }
    document.getElementById('history-symbol').addEventListener('change', fetchHistory);
    fetchCurrent();
    fetchHistory();
    setInterval(fetchCurrent, 10000);
    setInterval(fetchHistory, 15000);
  </script>
</body>
</html>
